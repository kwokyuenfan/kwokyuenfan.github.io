cv:
  name: Kwok Yuen Fan
  label: Assistant Professor of Economics and Finance
  email: terrilfan@outlook.com
  address:
    city: Hong Kong
    region: China
  website: https://kwokyuenfan.github.io
  summary: >
    Assistant Professor of Economics and Finance at The Hang Seng University of Hong Kong (HSUHK).
    My research uses Corporate Finance as a lens to examine how firms balance economic gains with social welfare,
    with a focus on sustainability, real estate, and corporate finance. My work spans ESG engagement in REITs,
    the political economy of pollution, climate resilience in property markets, and the role of fintech in household adaptation to climate shocks.

  sections:
